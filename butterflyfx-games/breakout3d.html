   cur<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ButterflyFX Breakout 3D - Manifold Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0,255,200,0.8);
            z-index: 100;
            color: #00ffcc;
        }
        #score { margin-bottom: 15px; }
        #level { margin-bottom: 15px; }
        #bricksLeft { margin-bottom: 15px; }
        #energy { margin-bottom: 15px; color: #ffaa00; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #00ffcc;
            z-index: 100;
        }
        .control-item { margin: 5px 0; color: #00ffcc; }
        .key { background: #1a1a2e; padding: 2px 6px; border-radius: 3px; font-family: monospace; color: #00ff88; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="hud">
        <div id="score">Score: 0</div>
        <div id="level">Level: 1</div>
        <div id="bricksLeft">Bricks: 0</div>
        <div id="energy">Speed: 0</div>
    </div>
    <div id="controls">
        <div class="control-item"><span class="key">Left Mouse</span> Move paddle</div>
        <div class="control-item"><span class="key">Space</span> Launch ball</div>
        <div class="control-item"><span class="key">R</span> Reset level</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // =============================
        // ButterflyFX Manifold System
        // =============================
        
        // Kernel state - immutable manifold tracking
        class ManifoldState {
            constructor(spiral = 0, level = 0) {
                this.spiral = spiral;
                this.level = Math.max(0, Math.min(6, level));
            }
            
            invoke(k) {
                return new ManifoldState(this.spiral, Math.max(0, Math.min(6, k)));
            }
            
            spiralUp() {
                if (this.level === 6) return new ManifoldState(this.spiral + 1, 0);
                return this;
            }
        }
        
        // Game Manifold - all state tracked through kernel
        class GameManifold {
            constructor() {
                this.kernelState = new ManifoldState(0, 0);
                this.data = {
                    score: 0,
                    level: 1,
                    ballSpeed: 25,
                    ballSpeedMax: 40,
                    ballSpeedMin: 15,
                    bricksRemaining: 0,
                    ballLaunched: false,
                    paddleSpeed: 0,
                    paddleSpeedMax: 100
                };
            }
            
            updateKernel(key, value) {
                this.data[key] = value;
                if (key === 'score' && value > 0 && value % 10 === 0) {
                    this.kernelState = this.kernelState.spiralUp();
                }
                if (key === 'level') {
                    this.kernelState = this.kernelState.invoke(Math.min(6, value));
                }
            }
            
            getManifoldValue(key) {
                return this.data[key];
            }
            
            increaseBallSpeed(amount = 0.5) {
                const newSpeed = Math.min(
                    this.data.ballSpeedMax,
                    this.data.ballSpeed + amount
                );
                this.updateKernel('ballSpeed', newSpeed);
                return newSpeed;
            }
            
            updatePaddleSpeed(cursorVelocity) {
                // Manifold-controlled paddle speed based on cursor movement
                const speed = Math.min(this.data.paddleSpeedMax, cursorVelocity);
                this.updateKernel('paddleSpeed', speed);
                return speed;
            }
        }
        
        const gameManifold = new GameManifold();

        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio || 1);
        renderer.setClearColor(0x0a0a1a, 1);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        camera.position.set(0, 8, 22);
        camera.lookAt(0, 0, 0);

        // Reduce initial ball speed
        gameManifold.data.ballSpeed = 12;

        const maskGeometry = new THREE.SphereGeometry(600, 32, 32);
        const maskMaterial = new THREE.MeshBasicMaterial({
            color: 0x000000,
            transparent: true,
            opacity: 0.3,
            side: THREE.BackSide,
            fog: false
        });
        const depthMask = new THREE.Mesh(maskGeometry, maskMaterial);
        scene.add(depthMask);

        const starsGeometry = new THREE.BufferGeometry();
        const starCount = 3000;
        const starPositions = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);
        const starSizes = new Float32Array(starCount);
        const starPhases = new Float32Array(starCount); // For twinkling animation
        
        for (let i = 0; i < starCount; i++) {
            starPositions[i * 3] = (Math.random() - 0.5) * 1000;
            starPositions[i * 3 + 1] = (Math.random() - 0.5) * 1000;
            starPositions[i * 3 + 2] = (Math.random() - 0.5) * 1000;
            
            const brightness = Math.random();
            starColors[i * 3] = brightness;
            starColors[i * 3 + 1] = brightness * 0.9;
            starColors[i * 3 + 2] = brightness * 0.8;
            
            starSizes[i] = Math.random() * 2 + 0.5; // Variable star sizes
            starPhases[i] = Math.random() * Math.PI * 2; // Random animation phase
        }
        
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        starsGeometry.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
        
        const starsMaterial = new THREE.PointsMaterial({
            size: 1.0,
            vertexColors: true,
            fog: false,
            sizeAttenuation: true
        });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        const nebulaSphereGeometry = new THREE.SphereGeometry(500, 32, 32);
        const nebulaMaterial = new THREE.MeshBasicMaterial({
            color: 0x1a0033,
            transparent: true,
            opacity: 0.1,
            side: THREE.BackSide,
            fog: false
        });
        const nebulaSphere = new THREE.Mesh(nebulaSphereGeometry, nebulaMaterial);
        scene.add(nebulaSphere);

        const ambientLight = new THREE.AmbientLight(0x4488ff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(15, 25, 15);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.far = 100;
        directionalLight.shadow.camera.left = -40;
        directionalLight.shadow.camera.right = 40;
        directionalLight.shadow.camera.top = 40;
        directionalLight.shadow.camera.bottom = -40;
        scene.add(directionalLight);

        const pointLight1 = new THREE.PointLight(0x00ffff, 0.8, 50);
        pointLight1.position.set(10, 5, 10);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff00ff, 0.6, 50);
        pointLight2.position.set(-10, 5, -10);
        scene.add(pointLight2);

        const gameState = {
            score: 0,
            level: 1,
            ballLaunched: false,
            gameOver: false,
            bricksRemaining: 0
        };

        // Arena size matches brick grid
        const brickWidth = 2.0;
        const brickDepth = 2.0;
        const spacing = 0.2;
        const cellSize = brickWidth + spacing;
        const gridCount = 9; // 9x9 grid of bricks
        const arenaSize = gridCount * cellSize;
        
        const arenaGroup = new THREE.Group();
        scene.add(arenaGroup);

        function createGradientTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createLinearGradient(0, 0, 256, 256);
            gradient.addColorStop(0, 'rgba(0, 255, 200, 0.3)');
            gradient.addColorStop(0.5, 'rgba(100, 150, 255, 0.2)');
            gradient.addColorStop(1, 'rgba(200, 100, 255, 0.3)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 256, 256);
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        const gradientTexture = createGradientTexture();

        // Create gradient for walls and ceiling
        function createWallGradientTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Create vertical gradient for walls
            const gradient = ctx.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0, 'rgba(100, 200, 255, 0.4)');
            gradient.addColorStop(0.5, 'rgba(150, 100, 200, 0.3)');
            gradient.addColorStop(1, 'rgba(200, 100, 150, 0.4)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);
            
            // Add subtle shimmer lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 512; i += 32) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, 512);
                ctx.stroke();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        const wallGradientTexture = createWallGradientTexture();

        const glassGeometry = new THREE.BoxGeometry(arenaSize, arenaSize, arenaSize);
        const glassMaterial = new THREE.MeshStandardMaterial({
            map: wallGradientTexture,
            metalness: 0.6, // More reflective
            roughness: 0.2, // Smoother for better reflections
            transparent: true,
            opacity: 0.25, // More transparent to see through
            side: THREE.BackSide,
            envMapIntensity: 2.0
        });
        const arenaWalls = new THREE.Mesh(glassGeometry, glassMaterial);
        arenaWalls.castShadow = true;
        arenaWalls.receiveShadow = true;
        arenaGroup.add(arenaWalls);

        const edgeGeometry = new THREE.EdgesGeometry(glassGeometry);
        const edgeMaterial = new THREE.LineBasicMaterial({ 
            color: 0x00ffcc, 
            linewidth: 3,
            fog: false
        });
        const edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
        arenaGroup.add(edges);

        // Create gradient floor
        function createFloorGradient() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Create radial gradient from center
            const gradient = ctx.createRadialGradient(256, 256, 0, 256, 256, 512);
            gradient.addColorStop(0, 'rgba(100, 200, 255, 0.8)');
            gradient.addColorStop(0.5, 'rgba(50, 150, 200, 0.6)');
            gradient.addColorStop(1, 'rgba(20, 80, 150, 0.4)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);
            
            // Add grid lines
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.2)';
            ctx.lineWidth = 2;
            for (let i = 0; i <= 512; i += 64) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, 512);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(512, i);
                ctx.stroke();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        const floorGradient = createFloorGradient();
        const floorGeometry = new THREE.PlaneGeometry(arenaSize - 0.5, arenaSize - 0.5);
        const floorMaterial = new THREE.MeshStandardMaterial({
            map: floorGradient,
            metalness: 0.3,
            roughness: 0.7,
            transparent: true,
            opacity: 0.9
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -arenaSize / 2 + 0.02;
        floor.receiveShadow = true;
        arenaGroup.add(floor);

        const paddleGroup = new THREE.Group();
        arenaGroup.add(paddleGroup);

        // Paddle: semicircular with flat base using golden ratio
        const phi = (1 + Math.sqrt(5)) / 2; // 1.618
        const paddleRadius = phi * 2 * 0.6; // 1.945 (0.6 of size)
        const paddleHeight = phi * 0.6; // 0.971 (0.6 of size)
        
        // Create semicircular paddle using LatheGeometry
        const paddlePoints = [];
        paddlePoints.push(new THREE.Vector2(0, 0)); // Center bottom
        paddlePoints.push(new THREE.Vector2(paddleRadius, 0)); // Edge bottom
        
        // Create semicircle arc
        for (let i = 0; i <= 32; i++) {
            const angle = (i / 32) * Math.PI; // 0 to PI for semicircle
            const x = Math.cos(angle) * paddleRadius;
            const y = Math.sin(angle) * paddleHeight;
            paddlePoints.push(new THREE.Vector2(x, y));
        }
        
        const paddleGeometry = new THREE.LatheGeometry(paddlePoints, 32);
        const paddleMaterial = new THREE.MeshStandardMaterial({
            color: 0xffd700, // Gold color
            metalness: 0.95,
            roughness: 0.05,
            emissive: 0xffaa00,
            emissiveIntensity: 0.4
        });
        const paddle = new THREE.Mesh(paddleGeometry, paddleMaterial);
        paddle.castShadow = true;
        paddle.receiveShadow = true;
        paddle.position.y = 0;
        paddleGroup.add(paddle);

        let paddlePos = new THREE.Vector3(0, -arenaSize / 2 + 0.5, 0);

        const ballGeometry = new THREE.SphereGeometry(0.5, 64, 64);
        const ballMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            metalness: 0.95,
            roughness: 0.05,
            emissive: 0xffffff,
            emissiveIntensity: 0.2
        });
        const ball = new THREE.Mesh(ballGeometry, ballMaterial);
        ball.castShadow = true;
        ball.receiveShadow = true;
        arenaGroup.add(ball);

        // Ball shadow (projected onto floor and paddle)
        const shadowGeometry = new THREE.CircleGeometry(0.6, 32);
        const shadowMaterial = new THREE.MeshBasicMaterial({
            color: 0x000000,
            transparent: true,
            opacity: 0.4,
            fog: false
        });
        const ballShadow = new THREE.Mesh(shadowGeometry, shadowMaterial);
        ballShadow.rotation.x = -Math.PI / 2; // Rotate to face up
        ballShadow.position.y = -arenaSize / 2 + 0.01; // Just above floor
        arenaGroup.add(ballShadow);

        // Calculate lowest brick layer position
        const brickHeight = 1.0; // 1.0 height per layer
        const gridHeight = 5; // 5 layers
        const startY = arenaSize / 2 - (brickHeight * 3); // Top gap = 3 brick heights
        const lowestBrickY = startY - (gridHeight - 1) * brickHeight; // Bottom of lowest layer
        const ballStartY = lowestBrickY - brickHeight - 1; // Just below lowest layer
        
        let ballPos = new THREE.Vector3(0, ballStartY, 0);
        let ballVel = new THREE.Vector3(0, 0, 0);
        const ballRadius = 0.5;

        // Ball trail system
        const ballTrailPoints = [];
        const maxTrailLength = 30;
        const trailGeometry = new THREE.BufferGeometry();
        const trailMaterial = new THREE.LineBasicMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.6,
            linewidth: 2,
            fog: false
        });
        const ballTrail = new THREE.Line(trailGeometry, trailMaterial);
        arenaGroup.add(ballTrail);

        const brickGroup = new THREE.Group();
        arenaGroup.add(brickGroup);

        const bricks = [];

        // Spectrum colors for 6 layers (manifold-based)
        const spectrumColors = [
            { color1: '#ff0000', color2: '#ff4400' }, // Red
            { color1: '#ff8800', color2: '#ffaa00' }, // Orange
            { color1: '#ffff00', color2: '#ffff44' }, // Yellow
            { color1: '#00ff00', color2: '#44ff44' }, // Green
            { color1: '#0088ff', color2: '#0044ff' }, // Blue
            { color1: '#8800ff', color2: '#ff00ff' }  // Violet
        ];

        function createBrickGradientTexture(color1, color2) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createLinearGradient(0, 0, 128, 128);
            gradient.addColorStop(0, color1);
            gradient.addColorStop(1, color2);
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);
            
            for (let i = 0; i < 20; i++) {
                ctx.fillStyle = 'rgba(255, 255, 255, ' + Math.random() * 0.5 + ')';
                ctx.fillRect(Math.random() * 128, Math.random() * 128, 2, 2);
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        function createBricks() {
            brickGroup.clear();
            bricks.length = 0;

            const phi = (1 + Math.sqrt(5)) / 2; // Golden ratio: 1.618
            const brickWidth = 2.0;
            const brickHeight = 1.0; // 1.0 height per layer
            const brickDepth = 2.0;
            const spacing = 0.0; // NO GAPS
            const cornerRadius = 0.08; // Rounded corners

            // Calculate grid to cover entire plane - use exact brick dimensions
            const cellSize = brickWidth + spacing; // Use original spacing for grid calculation
            const gridX = Math.ceil(arenaSize / cellSize); // Fill entire X plane
            const gridZ = Math.ceil(arenaSize / cellSize); // Fill entire Z plane
            const gridHeight = 5; // 5 layers

            // Start positions to cover entire arena
            const startX = -arenaSize / 2 + brickWidth / 2;
            const startZ = -arenaSize / 2 + brickDepth / 2;
            const startY = arenaSize / 2 - (brickHeight * 3); // Top gap = 3 brick heights

            for (let level = 0; level < gridHeight; level++) {
                const levelColor = spectrumColors[level % spectrumColors.length];
                const brickTexture = createBrickGradientTexture(levelColor.color1, levelColor.color2);

                for (let x = 0; x < gridX; x++) {
                    for (let z = 0; z < gridZ; z++) {
                        // Position based on full brick width/depth (no spacing)
                        const xPos = startX + x * brickWidth;
                        const yPos = startY - level * brickHeight; // No spacing between layers
                        const zPos = startZ + z * brickDepth;

                        // Create full-size box geometry (no tapering to eliminate gaps)
                        const brickGeometry = new THREE.BoxGeometry(brickWidth, brickHeight, brickDepth);
                        
                        // Round the edges
                        const positionAttribute = brickGeometry.getAttribute('position');
                        const positions = positionAttribute.array;
                        
                        for (let i = 0; i < positions.length; i += 3) {
                            const x = positions[i];
                            const y = positions[i + 1];
                            const z = positions[i + 2];
                            
                            // Apply rounding to corners
                            positions[i] = Math.sign(x) * (Math.abs(x) - cornerRadius);
                            positions[i + 1] = Math.sign(y) * (Math.abs(y) - cornerRadius);
                            positions[i + 2] = Math.sign(z) * (Math.abs(z) - cornerRadius);
                        }
                        positionAttribute.needsUpdate = true;
                        brickGeometry.computeVertexNormals();

                        const brickMaterial = new THREE.MeshStandardMaterial({
                            map: brickTexture,
                            metalness: 0.95, // Ultra shiny like crystal
                            roughness: 0.02, // Very smooth, mirror-like
                            transparent: true,
                            opacity: 0.95,
                            emissive: new THREE.Color(levelColor.color1),
                            emissiveIntensity: 0.6, // Stronger glow
                            envMapIntensity: 2.0, // More reflective
                            side: THREE.DoubleSide // Show both sides
                        });

                        const brick = new THREE.Mesh(brickGeometry, brickMaterial);
                        brick.position.set(xPos, yPos, zPos);
                        brick.castShadow = true;
                        brick.receiveShadow = true;
                        brickGroup.add(brick);

                        bricks.push({
                            mesh: brick,
                            pos: new THREE.Vector3(xPos, yPos, zPos),
                            size: new THREE.Vector3(brickWidth, brickHeight, brickDepth),
                            active: true,
                            level: level,
                            gridX: x,
                            gridZ: z
                        });
                    }
                }
            }

            gameState.bricksRemaining = bricks.length;
            gameManifold.updateKernel('bricksRemaining', bricks.length);
        }

        createBricks();

        let mouseX = 0;
        let mouseY = 0;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let lastPaddleMouseX = 0;
        let lastPaddleMouseY = 0;
        let arenaRotation = { x: 0, y: 0 };
        let wheelPressed = false;
        let cameraDistance = 22;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            if (wheelPressed) {
                const deltaX = mouseX - lastMouseX;
                const deltaY = mouseY - lastMouseY;
                arenaRotation.y += deltaX * 0.01;
                arenaRotation.x += deltaY * 0.01;
            }

            lastMouseX = mouseX;
            lastMouseY = mouseY;
        });

        window.addEventListener('mousedown', (e) => {
            if (e.button === 1) {
                wheelPressed = true;
                lastMouseX = mouseX;
                lastMouseY = mouseY;
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 1) {
                wheelPressed = false;
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                if (!gameState.ballLaunched) {
                    gameState.ballLaunched = true;
                    gameManifold.updateKernel('ballLaunched', true);
                    
                    // Serve from random position just below brick level
                    const brickStartY = arenaSize / 2 - 2;
                    const serveY = brickStartY - 3; // Just below bricks
                    const randomX = (Math.random() - 0.5) * (arenaSize - 2);
                    const randomZ = (Math.random() - 0.5) * (arenaSize - 2);
                    ballPos.set(randomX, serveY, randomZ);
                    
                    const launchPower = gameManifold.getManifoldValue('ballSpeed');
                    // Launch at random angle upward
                    const horizontalAngle = Math.random() * Math.PI * 2;
                    const verticalAngle = Math.random() * (Math.PI / 6) + Math.PI / 6; // 30-60 degrees up
                    
                    const horizontalComponent = Math.sin(verticalAngle) * launchPower;
                    const verticalComponent = Math.cos(verticalAngle) * launchPower;
                    
                    ballVel.set(
                        Math.cos(horizontalAngle) * horizontalComponent,
                        verticalComponent,
                        Math.sin(horizontalAngle) * horizontalComponent
                    );
                }
            }
            if (e.key.toLowerCase() === 'r') {
                resetLevel();
            }
        });

        function resetLevel() {
            gameState.ballLaunched = false;
            gameManifold.updateKernel('ballLaunched', false);
            ballPos.set(0, -arenaSize / 2 + 2, 0);
            ballVel.set(0, 0, 0);
            paddlePos.set(0, -arenaSize / 2 + 0.2, 0);
            createBricks();
        }

        // Reusable raycaster and vectors for paddle tracking
        const paddleRaycaster = new THREE.Raycaster();
        const paddleMouse = new THREE.Vector2();
        const paddleY = -arenaSize / 2 + 0.5;
        const planeNormal = new THREE.Vector3(0, 1, 0);
        const planePoint = new THREE.Vector3(0, paddleY, 0);
        const buffer = 0.2;
        const minBound = -arenaSize / 2 + paddleRadius + buffer;
        const maxBound = arenaSize / 2 - paddleRadius - buffer;

        function updatePaddlePosition() {
            // Lock paddle to cursor position unless rotating camera
            if (!wheelPressed) {
                // Update mouse coordinates
                paddleMouse.x = (mouseX / window.innerWidth) * 2 - 1;
                paddleMouse.y = -(mouseY / window.innerHeight) * 2 + 1;
                
                paddleRaycaster.setFromCamera(paddleMouse, camera);

                const rayOrigin = paddleRaycaster.ray.origin;
                const rayDirection = paddleRaycaster.ray.direction;
                
                const denominator = planeNormal.dot(rayDirection);
                if (Math.abs(denominator) > 0.0001) {
                    const t = planeNormal.dot(planePoint.clone().sub(rayOrigin)) / denominator;
                    if (t > 0) {
                        const intersectionPoint = rayOrigin.clone().add(rayDirection.clone().multiplyScalar(t));
                        
                        // Lock paddle directly to cursor, clamped at boundaries, always at bottom
                        paddlePos.x = Math.max(minBound, Math.min(maxBound, intersectionPoint.x));
                        paddlePos.y = paddleY;
                        paddlePos.z = Math.max(minBound, Math.min(maxBound, intersectionPoint.z));
                        
                        // Update group position immediately
                        paddleGroup.position.copy(paddlePos);
                    }
                }
            }
        }

        function updateCamera() {
            depthMask.position.copy(camera.position);
            nebulaSphere.position.copy(camera.position);
        }

        const deltaTime = 1 / 60;
        let lastCollisionTime = -1; // Prevent multiple collisions per frame

        function reflectVelocity(velocity, normal, bounceFactor = 1.0) {
            // Clean reflection: v' = v - 2(v·n)n
            const dotProduct = velocity.dot(normal);
            const reflected = velocity.clone().sub(normal.clone().multiplyScalar(2 * dotProduct));
            return reflected.multiplyScalar(bounceFactor);
        }

        function updatePhysics() {
            if (!gameState.ballLaunched) return;

            // Move ball
            ballPos.add(ballVel.clone().multiplyScalar(deltaTime));

            // Check for bottomless pit
            if (ballPos.y < -arenaSize / 2 - 20) {
                gameState.ballLaunched = false;
                gameManifold.updateKernel('ballLaunched', false);
                ballPos.set(0, -arenaSize / 2 + 2, 0);
                ballVel.set(0, 0, 0);
                lastCollisionTime = -1;
                return;
            }

            const currentTime = Date.now();
            const minCollisionInterval = 16; // ms between collisions (one frame)
            let collisionThisFrame = false;

            // ===== WALL COLLISIONS =====
            const wallBounce = 0.98;
            
            // X walls
            if (ballPos.x > arenaSize / 2 - ballRadius) {
                ballVel = reflectVelocity(ballVel, new THREE.Vector3(-1, 0, 0), wallBounce);
                ballPos.x = arenaSize / 2 - ballRadius;
                collisionThisFrame = true;
            } else if (ballPos.x < -arenaSize / 2 + ballRadius) {
                ballVel = reflectVelocity(ballVel, new THREE.Vector3(1, 0, 0), wallBounce);
                ballPos.x = -arenaSize / 2 + ballRadius;
                collisionThisFrame = true;
            }

            // Z walls
            if (ballPos.z > arenaSize / 2 - ballRadius) {
                ballVel = reflectVelocity(ballVel, new THREE.Vector3(0, 0, -1), wallBounce);
                ballPos.z = arenaSize / 2 - ballRadius;
                collisionThisFrame = true;
            } else if (ballPos.z < -arenaSize / 2 + ballRadius) {
                ballVel = reflectVelocity(ballVel, new THREE.Vector3(0, 0, 1), wallBounce);
                ballPos.z = -arenaSize / 2 + ballRadius;
                collisionThisFrame = true;
            }

            // Y ceiling
            if (ballPos.y > arenaSize / 2 - ballRadius) {
                ballVel = reflectVelocity(ballVel, new THREE.Vector3(0, -1, 0), wallBounce);
                ballPos.y = arenaSize / 2 - ballRadius;
                collisionThisFrame = true;
            }

            // ===== PADDLE COLLISION =====
            if (!collisionThisFrame && currentTime - lastCollisionTime > minCollisionInterval) {
                const distToPaddle = ballPos.distanceTo(paddlePos);
                if (distToPaddle < paddleRadius + ballRadius) {
                    // Ball is within paddle radius
                    const contactVector = ballPos.clone().sub(paddlePos);
                    const contactDist = contactVector.length();
                    
                    if (contactDist < paddleRadius && ballPos.y < paddlePos.y + 1) {
                        // Ball is on top of paddle, reflect upward
                        const normal = new THREE.Vector3(0, 1, 0);
                        const dotProduct = ballVel.dot(normal);
                        
                        if (dotProduct < 0) { // Ball moving downward
                            ballVel = reflectVelocity(ballVel, normal, 0.95);
                            ballPos.y = paddlePos.y + ballRadius + 0.2;
                            collisionThisFrame = true;
                            lastCollisionTime = currentTime;
                        }
                    }
                }
            }

            // ===== BRICK COLLISIONS =====
            if (!collisionThisFrame && currentTime - lastCollisionTime > minCollisionInterval) {
                for (let brick of bricks) {
                    if (!brick.active) continue;

                    const brickMin = brick.pos.clone().sub(brick.size.clone().multiplyScalar(0.5));
                    const brickMax = brick.pos.clone().add(brick.size.clone().multiplyScalar(0.5));

                    // Find closest point on brick to ball center
                    const closestPoint = new THREE.Vector3(
                        Math.max(brickMin.x, Math.min(ballPos.x, brickMax.x)),
                        Math.max(brickMin.y, Math.min(ballPos.y, brickMax.y)),
                        Math.max(brickMin.z, Math.min(ballPos.z, brickMax.z))
                    );

                    const dist = ballPos.distanceTo(closestPoint);
                    
                    if (dist < ballRadius) {
                        // Calculate surface normal
                        const normal = ballPos.clone().sub(closestPoint).normalize();
                        const dotProduct = ballVel.dot(normal);
                        
                        // Only collide if ball is moving toward brick
                        if (dotProduct < 0) {
                            // Check if there's a brick below this one (layer-by-layer breaking)
                            const brickBelow = bricks.find(b => 
                                b.active && 
                                b.level === brick.level + 1 && 
                                b.gridX === brick.gridX && 
                                b.gridZ === brick.gridZ
                            );
                            
                            // Only allow breaking if no brick below
                            if (!brickBelow) {
                                // Reflect ball
                                ballVel = reflectVelocity(ballVel, normal, 0.95);
                                
                                // Separate ball from brick
                                const separation = ballRadius - dist + 0.5;
                                ballPos.add(normal.clone().multiplyScalar(separation));
                                
                                // Break brick
                                const speedIncrease = (brick.level + 1) * 0.3;
                                gameManifold.increaseBallSpeed(speedIncrease);
                                
                                brick.active = false;
                                brick.mesh.visible = false;
                                gameState.score += 1;
                                gameManifold.updateKernel('score', gameState.score);
                                gameState.bricksRemaining--;

                                collisionThisFrame = true;
                                lastCollisionTime = currentTime;

                                if (gameState.bricksRemaining === 0) {
                                    gameState.level++;
                                    gameManifold.updateKernel('level', gameState.level);
                                    setTimeout(() => {
                                        createBricks();
                                        gameState.ballLaunched = false;
                                        gameManifold.updateKernel('ballLaunched', false);
                                        ballPos.set(0, -arenaSize / 2 + 2, 0);
                                        ballVel.set(0, 0, 0);
                                        lastCollisionTime = -1;
                                    }, 1000);
                                }
                            } else {
                                // Brick below exists, just bounce off
                                ballVel = reflectVelocity(ballVel, normal, 0.95);
                                const separation = ballRadius - dist + 0.5;
                                ballPos.add(normal.clone().multiplyScalar(separation));
                                collisionThisFrame = true;
                                lastCollisionTime = currentTime;
                            }
                            
                            break; // Only one collision per frame
                        }
                    }
                }
            }

            ball.position.copy(ballPos);
        }

        function updateHUD() {
            document.getElementById('score').textContent = `Score: ${gameManifold.getManifoldValue('score')}`;
            document.getElementById('level').textContent = `Level: ${gameManifold.getManifoldValue('level')}`;
            document.getElementById('bricksLeft').textContent = `Bricks: ${gameState.bricksRemaining}`;
            const speed = ballVel.length().toFixed(1);
            const maxSpeed = gameManifold.getManifoldValue('ballSpeedMax');
            document.getElementById('energy').textContent = `Speed: ${speed} / ${maxSpeed}`;
        }

        function updateBallShadow() {
            // Update shadow position to follow ball XZ position on floor
            ballShadow.position.x = ballPos.x;
            ballShadow.position.z = ballPos.z;
            ballShadow.position.y = -arenaSize / 2 + 0.02; // Keep on floor
            
            // Scale shadow based on ball height (closer to floor = larger shadow)
            const floorY = -arenaSize / 2;
            const heightAboveFloor = ballPos.y - floorY;
            const maxHeight = arenaSize;
            
            // Shadow size increases as ball gets closer to floor
            const baseShadowRadius = 0.6;
            const shadowScale = 1 + (1 - (heightAboveFloor / maxHeight)) * 0.5;
            ballShadow.scale.set(shadowScale, shadowScale, 1);
            
            // Opacity increases as ball gets closer to floor
            const maxOpacity = 0.7;
            ballShadow.material.opacity = maxOpacity * (1 - (heightAboveFloor / maxHeight) * 0.3);
        }

        function updateBallTrail() {
            // Add current ball position to trail
            if (gameState.ballLaunched) {
                ballTrailPoints.push(ballPos.clone());
                
                // Keep trail at max length
                if (ballTrailPoints.length > maxTrailLength) {
                    ballTrailPoints.shift();
                }
                
                // Update trail geometry efficiently
                const positions = new Float32Array(ballTrailPoints.length * 3);
                for (let i = 0; i < ballTrailPoints.length; i++) {
                    positions[i * 3] = ballTrailPoints[i].x;
                    positions[i * 3 + 1] = ballTrailPoints[i].y;
                    positions[i * 3 + 2] = ballTrailPoints[i].z;
                }
                
                if (trailGeometry.getAttribute('position')) {
                    trailGeometry.getAttribute('position').array = positions;
                    trailGeometry.getAttribute('position').needsUpdate = true;
                    trailGeometry.setDrawRange(0, ballTrailPoints.length);
                } else {
                    trailGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                }
            } else {
                // Clear trail when ball is not launched
                ballTrailPoints.length = 0;
                if (trailGeometry.getAttribute('position')) {
                    trailGeometry.setDrawRange(0, 0);
                }
            }
        }

        // Wall reflection objects for visual feedback
        const wallReflections = {
            left: null,
            right: null,
            front: null,
            back: null,
            top: null
        };

        function createWallReflection(wallName) {
            const reflectionGeometry = new THREE.SphereGeometry(0.5, 32, 32);
            const reflectionMaterial = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                metalness: 0.8,
                roughness: 0.15,
                emissive: 0x88ccff,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.6
            });
            const reflection = new THREE.Mesh(reflectionGeometry, reflectionMaterial);
            reflection.castShadow = true;
            reflection.receiveShadow = true;
            arenaGroup.add(reflection);
            return reflection;
        }

        function updateWallReflections() {
            if (!gameState.ballLaunched) {
                // Hide all reflections when ball not launched
                Object.values(wallReflections).forEach(r => {
                    if (r) r.visible = false;
                });
                return;
            }

            const threshold = 3; // Distance from wall to show reflection
            const reflectionOffset = 0.3; // How far reflection appears into wall

            // Left wall reflection (X = -arenaSize/2)
            if (ballPos.x < -arenaSize / 2 + threshold) {
                if (!wallReflections.left) {
                    wallReflections.left = createWallReflection('left');
                }
                wallReflections.left.visible = true;
                wallReflections.left.position.x = -arenaSize / 2 - reflectionOffset;
                wallReflections.left.position.y = ballPos.y;
                wallReflections.left.position.z = ballPos.z;
                // Fade based on distance to wall
                const distToWall = Math.abs(ballPos.x - (-arenaSize / 2));
                wallReflections.left.material.opacity = 0.6 * (1 - distToWall / threshold);
            } else if (wallReflections.left) {
                wallReflections.left.visible = false;
            }

            // Right wall reflection (X = arenaSize/2)
            if (ballPos.x > arenaSize / 2 - threshold) {
                if (!wallReflections.right) {
                    wallReflections.right = createWallReflection('right');
                }
                wallReflections.right.visible = true;
                wallReflections.right.position.x = arenaSize / 2 + reflectionOffset;
                wallReflections.right.position.y = ballPos.y;
                wallReflections.right.position.z = ballPos.z;
                const distToWall = Math.abs(ballPos.x - (arenaSize / 2));
                wallReflections.right.material.opacity = 0.6 * (1 - distToWall / threshold);
            } else if (wallReflections.right) {
                wallReflections.right.visible = false;
            }

            // Front wall reflection (Z = arenaSize/2)
            if (ballPos.z > arenaSize / 2 - threshold) {
                if (!wallReflections.front) {
                    wallReflections.front = createWallReflection('front');
                }
                wallReflections.front.visible = true;
                wallReflections.front.position.x = ballPos.x;
                wallReflections.front.position.y = ballPos.y;
                wallReflections.front.position.z = arenaSize / 2 + reflectionOffset;
                const distToWall = Math.abs(ballPos.z - (arenaSize / 2));
                wallReflections.front.material.opacity = 0.6 * (1 - distToWall / threshold);
            } else if (wallReflections.front) {
                wallReflections.front.visible = false;
            }

            // Back wall reflection (Z = -arenaSize/2)
            if (ballPos.z < -arenaSize / 2 + threshold) {
                if (!wallReflections.back) {
                    wallReflections.back = createWallReflection('back');
                }
                wallReflections.back.visible = true;
                wallReflections.back.position.x = ballPos.x;
                wallReflections.back.position.y = ballPos.y;
                wallReflections.back.position.z = -arenaSize / 2 - reflectionOffset;
                const distToWall = Math.abs(ballPos.z - (-arenaSize / 2));
                wallReflections.back.material.opacity = 0.6 * (1 - distToWall / threshold);
            } else if (wallReflections.back) {
                wallReflections.back.visible = false;
            }

            // Top wall reflection (Y = arenaSize/2)
            if (ballPos.y > arenaSize / 2 - threshold) {
                if (!wallReflections.top) {
                    wallReflections.top = createWallReflection('top');
                }
                wallReflections.top.visible = true;
                wallReflections.top.position.x = ballPos.x;
                wallReflections.top.position.y = arenaSize / 2 + reflectionOffset;
                wallReflections.top.position.z = ballPos.z;
                const distToWall = Math.abs(ballPos.y - (arenaSize / 2));
                wallReflections.top.material.opacity = 0.6 * (1 - distToWall / threshold);
            } else if (wallReflections.top) {
                wallReflections.top.visible = false;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            updatePaddlePosition();
            updatePhysics();
            updateCamera();
            updateHUD();
            updateBallShadow();
            updateBallTrail();
            updateWallReflections();

            // Calculate cursor velocity for manifold paddle speed
            const cursorDeltaX = mouseX - lastPaddleMouseX;
            const cursorDeltaY = mouseY - lastPaddleMouseY;
            const cursorVelocity = Math.sqrt(cursorDeltaX * cursorDeltaX + cursorDeltaY * cursorDeltaY);
            gameManifold.updatePaddleSpeed(cursorVelocity);
            lastPaddleMouseX = mouseX;
            lastPaddleMouseY = mouseY;

            pointLight1.position.x = Math.sin(Date.now() * 0.001) * 15;
            pointLight2.position.z = Math.cos(Date.now() * 0.001) * 15;

            stars.position.copy(camera.position).multiplyScalar(0.08);

            // Animate stars - twinkling and sparkling effect
            const time = Date.now() * 0.001;
            const sizeAttribute = starsGeometry.getAttribute('size');
            const colorAttribute = starsGeometry.getAttribute('color');
            
            for (let i = 0; i < starCount; i++) {
                // Twinkling animation - stars pulse in brightness
                const twinkle = Math.sin(time * 2 + starPhases[i]) * 0.5 + 0.5;
                const sparkle = Math.sin(time * 4 + starPhases[i]) * 0.3 + 0.7;
                
                // Update size for sparkling effect
                sizeAttribute.array[i] = starSizes[i] * sparkle;
                
                // Update color brightness for twinkling
                const baseColor = Math.sqrt(
                    colorAttribute.array[i * 3] * colorAttribute.array[i * 3] +
                    colorAttribute.array[i * 3 + 1] * colorAttribute.array[i * 3 + 1] +
                    colorAttribute.array[i * 3 + 2] * colorAttribute.array[i * 3 + 2]
                );
                
                const brightness = twinkle * sparkle;
                colorAttribute.array[i * 3] = brightness;
                colorAttribute.array[i * 3 + 1] = brightness * 0.9;
                colorAttribute.array[i * 3 + 2] = brightness * 0.8;
            }
            
            sizeAttribute.needsUpdate = true;
            colorAttribute.needsUpdate = true;

            arenaGroup.rotation.x = arenaRotation.x;
            arenaGroup.rotation.y = arenaRotation.y;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
