version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: butterflyfx-games
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ../:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - butterflyfx

networks:
  butterflyfx:
    driver: bridge
