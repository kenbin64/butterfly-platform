<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saddle Synth - Audio from z=xy</title>
  <link rel="stylesheet" href="../../../lib/fonts/fonts.css">
  <style>
    :root { --bg: #0a0a10; --panel: rgba(15,15,25,0.9); --cyan: #00d4ff; --magenta: #ff2d95; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: #e8e8f0; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }

    header { text-align: center; padding: 30px 20px 20px; }
    .back { color: #888; text-decoration: none; font-size: 0.9rem; }
    h1 { font-family: 'Orbitron'; font-size: 2rem; color: var(--cyan); margin-top: 10px; }
    .subtitle { color: #666; font-size: 0.85rem; }

    .synth-container { max-width: 900px; margin: 0 auto; padding: 20px; }

    .visualizer {
      height: 200px; background: rgba(0,0,0,0.4); border-radius: 16px;
      border: 1px solid rgba(0,180,255,0.3); margin-bottom: 20px; overflow: hidden;
    }
    .visualizer canvas { width: 100%; height: 100%; }

    .keyboard {
      display: flex; justify-content: center; gap: 4px; margin-bottom: 30px;
      padding: 20px; background: var(--panel); border-radius: 16px;
      border: 1px solid rgba(0,180,255,0.2);
    }
    .key {
      width: 50px; height: 150px; background: linear-gradient(180deg, #fff, #e8e8e8);
      border-radius: 0 0 6px 6px; cursor: pointer; transition: all 0.1s;
      position: relative; border: 1px solid #ccc;
    }
    .key:hover { background: linear-gradient(180deg, #e0f0ff, #d0e8ff); }
    .key:active, .key.active { background: linear-gradient(180deg, var(--cyan), #008fcc); transform: translateY(2px); }
    .key-label { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #333; font-size: 0.9rem; }

    .black-key {
      width: 35px; height: 90px; background: linear-gradient(180deg, #333, #111);
      margin: 0 -17px; z-index: 10; border-radius: 0 0 4px 4px; border: none;
    }
    .black-key:hover { background: linear-gradient(180deg, #444, #222); }
    .black-key:active, .black-key.active { background: linear-gradient(180deg, #00a0cc, #006688); }
    .black-key .key-label { color: #888; }

    .controls {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px; padding: 20px; background: var(--panel); border-radius: 16px;
      border: 1px solid rgba(0,180,255,0.2);
    }
    .control-group h3 { font-size: 0.9rem; color: var(--cyan); margin-bottom: 10px; }
    .control-row { margin-bottom: 10px; }
    .control-row label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 4px; }
    .control-row input[type="range"] { width: 100%; }

    .waveform-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .wave-btn {
      padding: 8px 16px; background: rgba(0,0,0,0.4); border: 1px solid rgba(0,180,255,0.3);
      border-radius: 8px; color: #888; cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
    }
    .wave-btn:hover, .wave-btn.active { background: rgba(0,212,255,0.2); color: var(--cyan); border-color: var(--cyan); }

    .info { text-align: center; margin-top: 20px; font-size: 0.8rem; color: #555; }
  </style>
</head>
<body>
  <header>
    <a href="../index.html" class="back">← Back to Zenxy</a>
    <h1>🎹 SADDLE SYNTH</h1>
    <p class="subtitle">Audio synthesis powered by z = xy oscillations</p>
  </header>

  <div class="synth-container">
    <div class="visualizer">
      <canvas id="viz"></canvas>
    </div>

    <div class="keyboard" id="keyboard"></div>

    <div class="controls">
      <div class="control-group">
        <h3>Waveform</h3>
        <div class="waveform-btns">
          <button class="wave-btn active" data-wave="saddle">Saddle</button>
          <button class="wave-btn" data-wave="sine">Sine</button>
          <button class="wave-btn" data-wave="square">Square</button>
          <button class="wave-btn" data-wave="sawtooth">Sawtooth</button>
        </div>
      </div>

      <div class="control-group">
        <h3>Envelope</h3>
        <div class="control-row">
          <label>Attack: <span id="attackVal">0.1</span>s</label>
          <input type="range" id="attack" min="0.01" max="1" step="0.01" value="0.1">
        </div>
        <div class="control-row">
          <label>Release: <span id="releaseVal">0.3</span>s</label>
          <input type="range" id="release" min="0.05" max="2" step="0.05" value="0.3">
        </div>
      </div>

      <div class="control-group">
        <h3>Saddle Modulation</h3>
        <div class="control-row">
          <label>Helix Depth: <span id="helixVal">0.5</span></label>
          <input type="range" id="helix" min="0" max="1" step="0.05" value="0.5">
        </div>
        <div class="control-row">
          <label>Phase Rotation: <span id="phaseVal">0.0</span></label>
          <input type="range" id="phase" min="0" max="6.28" step="0.1" value="0">
        </div>
      </div>
    </div>

    <p class="info">Click keys or use keyboard (A-K for white, W-U for black). The saddle waveform uses z=xy geometry for unique harmonic content.</p>
  </div>

  <script src="synth.js"></script>
</body>
</html>
